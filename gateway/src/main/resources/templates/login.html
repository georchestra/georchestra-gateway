<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>Login</title>
    <link rel="stylesheet" type="text/css" media="screen" href="/home/css/bootstrap.css">
    <link rel="stylesheet" type="text/css" media="screen" href="/home/css/style.css">
    <link rel="stylesheet" type="text/css" media="screen" href="/home/css/contacts-style.css">
    <link rel="stylesheet" type="text/css" media="screen" href="/home/css/information-style.css">
    <style>
        /* Reserves space for the iframe-header */
        #placeholder {
            display: flex;
            height: 120px;
            min-height: 120px;
            width: 100%;
        }
        .main {
            max-width:1230px;
            flex: 1 0 300px;
            width: 100%;
            margin: 0 auto;
            padding: 0px;
            padding: 0px;
        }
        .centered-row {
            display: flex;
            justify-content: center; /* Center the items */
        }

        /* Align the title in the same ways as the login box */
        .title-box {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 0px;
            margin: 0 30px;
            width: 325px;
        }

        .login-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 0px;
            margin: 0 30px;

            width: 325px;
            height: 250px;
            border-radius: 1rem;
            background-color: #f2f2f2;
        }

        /* Move Boxes in a vertical column on smaller screen */
        @media (max-width: 780px) {
            .centered-row {
                flex-direction: column;
                align-items: center;
            }
            .login-box {
                margin-bottom: 30px;
            }
            #empty-box {
                margin: 0px;
                padding: 0px;
            }
        }

        .login-logo {
            height: 75px;
            display: flex;
            justify-content: center;
        }
        .login-button {
            width: 150px;
            padding-top: 5px;
            height: 36px;
            border-radius: 0.5rem;
            color: white;
            text-align: center;
        }
        #button-telekom {
            background-color: var(--color-telekom-magenta);
            border-color: var(--color-telekom-magenta);
        }
        #button-gfp {
            background-color: #263f5e;
            border-color: #263f5e;
        }
    </style>
</head>

<body style="display:flex; flex-direction:column;">
    <div id="placeholder"></div>
    <header th:if="${header_url != null}" style="height:120px;">
        <iframe id="header" title="Header" th:src="${header_url} + '?noLoginButton=true'" th:style="'width:100%;height:'+${header_height}+'px;border:none;overflow:hidden;transition: all 0.3s ease 0s;'" scrolling="no"
                frameborder="0"></iframe>
    </header>
    <main class="main">
        <div class="centered-row">
            <div class="title-box">
                <p class="fw-light fs-2">
                    Login <span class="fw-bold fs-2">FibrePartners</span>
                </p>
            </div>
            <div id="empty-box" class="title-box"></div>

        </div>
                <div th:if="${oauth2LoginLinks.size() != 0}">
                    <div class="centered-row">
                        <div th:each="oauth2Client : ${oauth2LoginLinks}" th:if="${oauth2Client.value == 'icu' || oauth2Client.value == 'icu_gfp'}" class="login-box">
                            <div class="login-logo">
                                <img th:src="${oauth2Client.value == 'icu' ? '/T_logo_rgb_p.png' : '/GFP_logo.png'}" height="75px"/>
                            </div>
                            <div th:text="${oauth2Client.value == 'icu' ? 'Partner Telekom' : 'Glasfaserplus & Partner'}" class="fw-bold fs-5"></div>
                            <a th:href="${oauth2Client.key}" th:id="${oauth2Client.value == 'icu' ? 'button-telekom' : 'button-gfp'}" type="button" class="login-button">Login</a>
                        </div>
                    </div>
            </div>
    </main>
    <footer th:if="${footer_url != null}">
        <iframe id="footer" th:src="${footer_url}" style="width:100%;border:none;overflow:hidden;height:90px" scrolling="no"
                frameborder="0"></iframe>
    </footer>
</body>
</html>
