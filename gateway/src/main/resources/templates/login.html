<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>Login</title>
    <link rel="stylesheet" type="text/css" media="screen" href="/home/css/bootstrap.css">
    <link rel="stylesheet" type="text/css" media="screen" href="/home/css/style.css">
    <link rel="stylesheet" type="text/css" media="screen" href="/home/css/contacts-style.css">
    <link rel="stylesheet" type="text/css" media="screen" href="/home/css/information-style.css">
</head>

<body>
    <header th:if="${header_url != null}">
        <iframe id="header" title="Header" th:src="${header_url}?noLoginButton=true" th:style="'width:100%;height:'+${header_height}+'px;border:none;overflow:hidden;transition: all 0.3s ease 0s;'" scrolling="no"
                frameborder="0"></iframe>
    </header>
    <main>
        <div class="container-fluid">
            <div class="welcome-session">
                <form class="form-signin" method="post" action="/login" th:if="${ldapEnabled}">
                    <h2 class="form-signin-heading">Please sign in: </h2>
                    <p>
                        <label for="username" class="sr-only">Username</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="Username" required autofocus>
                    </p>
                    <p>
                        <label for="password" class="sr-only">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                    </p>
                    <button class="btn btn-lg btn-primary btn-block" type="submit">Sign in</button>
                </form>
                <h2 class="form-signin-heading">Telekom Business Login</h2>
                <table class="table table-striped">
                    <tr th:each="oauth2Client : ${oauth2LoginLinks}">
                        <td>
                            <a th:href="${oauth2Client.key}" th:text="${oauth2Client.value == 'ICU' ? 'anmelden' : oauth2Client.value}"></a>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
    </main>
    <footer th:if="${footer_url != null}">
        <iframe id="footer" th:src="${footer_url}" style="width:100%;border:none;overflow:hidden;" scrolling="no"
                frameborder="0"></iframe>
    </footer>
</body>
</html>
