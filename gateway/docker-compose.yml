version: "3.1"

volumes:
  postgresql_data:
  datadir:
    driver_opts:
      type: none
      o: bind
      device: $PWD/datadir

secrets:
  slapd_password:
    file: ./datadir/secrets/slapd_password.txt
  geoserver_privileged_user_passwd:
    file: ./datadir/secrets/geoserver_privileged_user_passwd.txt

services:
  polipo:
    image: binlab/polipo
    container_name: polipo
    hostname: polipo
    restart: always
    ports:
      - 8123:8123/tcp
    command: |
      proxyAddress="0.0.0.0"
      proxyPort="8123"
      allowedPorts="1-65535"
      tunnelAllowedPorts="1-65535"
      logLevel="255"
      
    #command: [binlab/polipo, 'proxyAddress=0.0.0.0', 'logLevel=255']

  database:
    image: georchestra/database:latest
    environment:
      - POSTGRES_USER=georchestra
      - POSTGRES_PASSWORD=georchestra
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    restart: always
    ports:
      - 54321:5432

  ldap:
    image: georchestra/ldap:latest
    secrets:
      - slapd_password
      - geoserver_privileged_user_passwd
    environment:
        - SLAPD_ORGANISATION=georchestra
        - SLAPD_DOMAIN=georchestra.org
        - SLAPD_PASSWORD_FILE=/run/secrets/slapd_password
        - SLAPD_PASSWORD=
        - GEOSERVER_PRIVILEGED_USER_PASSWORD_FILE=/run/secrets/geoserver_privileged_user_passwd
        - SLAPD_LOG_LEVEL=32768 # See https://www.openldap.org/doc/admin24/slapdconfig.html#loglevel%20%3Clevel%3E
    restart: always
    ports:
      - 3891:389

  gateway:
    image: georchestra/gateway:22.1-SNAPSHOT
    depends_on:
      - ldap
      - database
    volumes:
      - datadir:/etc/georchestra
    environment:
      - JAVA_TOOL_OPTIONS=-Dgeorchestra.datadir=/etc/georchestra -Dspring.profiles.active=docker,icu,proxy,jsonlogs -Xmx512M -Dreactor.netty.http.server.accessLogEnabled=true
      - GOOGLE_CLIENT_ID=539019376623-98bfblg8t9efd507ia4qv0v7r79afits.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=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
      - GITHUB_CLIENT_ID=500edcae13ce93734f87
      - GITHUB_CLIENT_SECRET=f0fc8b9255798cfa39ac78b07803e1094ff5ef98
      - ICU_CLIENT_ID=gdi
      - ICU_CLIENT_SECRET=
    restart: always
    ports:
      - 8080:8080
      - 8090:8090

  header:
    image: georchestra/header:latest
    volumes:
      - datadir:/etc/georchestra
    environment:
      - JAVA_OPTIONS=-Dorg.eclipse.jetty.annotations.AnnotationParser.LEVEL=OFF
      - XMS=256M
      - XMX=512M
    restart: always
    ports:
      - 10003:8080

  geoserver:
    image: georchestra/geoserver:latest
    depends_on:
      - ldap
    volumes:
      - datadir:/etc/georchestra
    environment:
      - JAVA_OPTIONS=-Dorg.eclipse.jetty.annotations.AnnotationParser.LEVEL=OFF
      - XMS=256M
      - XMX=8G
    restart: always
    ports:
      - 10006:8080

  console:
    image: georchestra/console:latest
    depends_on:
      - ldap
      - database
    volumes:
      - datadir:/etc/georchestra
    environment:
      - JAVA_OPTIONS=-Dorg.eclipse.jetty.annotations.AnnotationParser.LEVEL=OFF
      - XMS=256M
      - XMX=1G
    restart: always
    ports:
      - 10007:8080
    